// ── Helpers ───────────────────────────────────────────────
function ymd(d) { return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`; }
function fmtEs(iso) { const [y, m, d] = iso.split("-"); return `${d}/${m}/${y}`; }
function nightsBetween(a, b) { return Math.max(1, Math.round((new Date(b) - new Date(a)) / 86400000)); }

// ── Supabase REST helpers ─────────────────────────────────
async function sbGet(table, query = "") {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${query}`, { headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` } });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbPost(table, body) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}`, {
    method: "POST",
    headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}`, "Content-Type": "application/json", Prefer: "return=representation" },
    body: JSON.stringify(body),
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

// Inventory-aware availability — mirrors real backend logic exactly
async function getInventoryMap() {
  try {
    const rows = await sbGet("room_inventory", "select=room_type,units");
    const map = {};
    for (const r of rows || []) map[r.room_type] = r.units;
    return map;
  } catch { return { doble: 3, apartamento: 2, familiar: 2 }; }
}

async function getBlockedDates(roomKey, days = 365) {
  const units = roomsCount(roomKey); // nº de habitaciones físicas de ese tipo (fuente fiable)
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const horizon = new Date(today.getTime() + days * 86400000);
  if (units <= 0) {
    const all = [];
    for (let d = new Date(today); d < horizon; d = new Date(d.getTime() + 86400000)) all.push(ymd(d));
    return all;
  }
  try {
    const rows = await sbGet("reservations", `select=check_in,check_out&room_type=eq.${roomKey}&status=neq.cancelada&check_in=lt.${ymd(horizon)}&check_out=gte.${ymd(today)}`);
    const counts = new Map();
    for (const r of rows || []) {
      const s = new Date(r.check_in + "T00:00:00"), e = new Date(r.check_out + "T00:00:00");
      for (let d = new Date(s); d < e; d = new Date(d.getTime() + 86400000)) {
        if (d < today || d >= horizon) continue;
        const k = ymd(d); counts.set(k, (counts.get(k) || 0) + 1);
      }
    }
    // Una noche se bloquea solo si TODAS las habitaciones del tipo están ocupadas
    return Array.from(counts.entries()).filter(([, c]) => c >= units).map(([k]) => k);
  } catch { return []; }
}

async function ensureAvailable(roomType, checkIn, checkOut) {
  // Comprobación REAL: debe existir UNA habitación física libre durante TODO el rango.
  // No basta con que cada noche quede "una libre" si es distinta cada noche (sería overbooking).
  const candidates = ROOMS_BY_TYPE[roomType] || [];
  if (candidates.length === 0) throw new Error("Ese tipo de habitación no está disponible");
  const overlapping = await sbGet("reservations", `select=room_number&room_type=eq.${roomType}&status=neq.cancelada&check_in=lt.${checkOut}&check_out=gt.${checkIn}`);
  const ocupadas = new Set((overlapping || []).map(r => r.room_number).filter(Boolean));
  // Buscar la primera habitación física libre todo el rango
  const freeRoom = candidates.find(rm => !ocupadas.has(rm));
  if (!freeRoom) throw new Error("Lo sentimos, no quedan habitaciones disponibles para esas fechas");
  return freeRoom; // devolvemos la habitación asignable
}

async function createReservation(form) {
  const today = new Date(); today.setHours(0, 0, 0, 0);
  if (new Date(form.check_in + "T00:00:00") < today) throw new Error("La fecha de entrada no puede ser anterior a hoy");
  if (new Date(form.check_out) <= new Date(form.check_in)) throw new Error("La fecha de salida debe ser posterior a la de entrada");
  const assignedRoom = await ensureAvailable(form.room_type, form.check_in, form.check_out);
  const nights = nightsBetween(form.check_in, form.check_out);
  const total_price = nights * (ROOM_PRICES[form.room_type] || 0);
  const { source, ...insertData } = form;
  const rows = await sbPost("reservations", { ...insertData, total_price, status: "pendiente", room_number: assignedRoom });
  const row = Array.isArray(rows) ? rows[0] : rows;
  const emailData = { room_type: form.room_type, guest_name: form.guest_name, guest_email: form.guest_email, guest_phone: form.guest_phone || "", check_in: form.check_in, check_out: form.check_out, num_guests: form.num_guests, total_price };
  Promise.all([emailNuevaReservaAdmin(emailData), emailConfirmacionHuesped(emailData)]).catch(e => console.error("Email send error:", e));
  return { id: row?.id, total_price, nights };
}

// ── useReveal: scroll-triggered fade-up (mirrors real IntersectionObserver) ─
function useReveal() {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const io = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) { setVisible(true); io.disconnect(); }
    }, { threshold: 0.15, rootMargin: "0px 0px -40px 0px" });
    io.observe(el);
    return () => io.disconnect();
  }, []);
  return [ref, visible];
}

function Reveal({ children, className = "", style = {} }) {
  const [ref, visible] = useReveal();
  return (
    <div ref={ref} style={{
      opacity: visible ? 1 : 0,
      transform: visible ? "translateY(0)" : "translateY(24px)",
      transition: "opacity 0.7s cubic-bezier(0.2,0.7,0.2,1), transform 0.7s cubic-bezier(0.2,0.7,0.2,1)",
      ...style,
    }} className={className}>
      {children}
    </div>
  );
}


// ── Calendar (range mode) — mirrors react-day-picker behavior ────
function Calendar({ blocked = [], range, onSelect }) {
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const [vy, setVy] = useState(today.getFullYear());
  const [vm, setVm] = useState(today.getMonth());
  const [hover, setHover] = useState(null);
  const blockedSet = new Set(blocked);
  const from = range.from, to = range.to;
  const MONTHS = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
  const DOW = ["lu","ma","mi","ju","vi","sá","do"];

  function getDays() {
    const first = new Date(vy, vm, 1), last = new Date(vy, vm + 1, 0), days = [];
    const sw = (first.getDay() + 6) % 7;
    for (let i = 0; i < sw; i++) days.push(null);
    for (let d = 1; d <= last.getDate(); d++) days.push(new Date(vy, vm, d));
    return days;
  }

  function handleClick(d) {
    if (!d) return;
    const isPast = d < today;
    const isBlocked = blockedSet.has(ymd(d));
    // El día de SALIDA puede caer en un día ocupado (esa noche ya no se duerme),
    // siempre que ya haya entrada elegida, aún no haya salida, y todas las
    // noches entre la entrada y este día estén libres.
    let usableAsCheckout = isBlocked && from && !to && d > from;
    if (usableAsCheckout) {
      for (let c = new Date(from.getTime() + 86400000); c < d; c = new Date(c.getTime() + 86400000)) {
        if (blockedSet.has(ymd(c))) { usableAsCheckout = false; break; }
      }
    }
    if (isPast) return;
    if (isBlocked && !usableAsCheckout) return;
    if (!from || (from && to)) { onSelect({ from: d, to: undefined }); return; }
    if (d <= from) { onSelect({ from: d, to: undefined }); return; }
    // Validar que TODAS las noches entre entrada y salida estén libres (la noche de salida no cuenta)
    let hasBlocked = false;
    for (let c = new Date(from.getTime() + 86400000); c < d; c = new Date(c.getTime() + 86400000)) {
      if (blockedSet.has(ymd(c))) { hasBlocked = true; break; }
    }
    if (hasBlocked) { onSelect({ from: d, to: undefined }); return; }
    onSelect({ from, to: d });
  }

  return (
    <div style={{ background: "#fefbf8", border: "1px solid #e4dbda", borderRadius: 6, padding: 10, userSelect: "none", width: 260, boxSizing: "border-box" }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 6 }}>
        <button onClick={() => vm === 0 ? (setVm(11), setVy(y => y - 1)) : setVm(m => m - 1)} style={{ background: "none", border: "1px solid #e4dbda", borderRadius: 4, fontSize: 14, cursor: "pointer", padding: "2px 8px", color: "#190e0d" }}>‹</button>
        <span style={{ fontSize: "0.82rem", fontWeight: 600, textTransform: "capitalize" }}>{MONTHS[vm]} {vy}</span>
        <button onClick={() => vm === 11 ? (setVm(0), setVy(y => y + 1)) : setVm(m => m + 1)} style={{ background: "none", border: "1px solid #e4dbda", borderRadius: 4, fontSize: 14, cursor: "pointer", padding: "2px 8px", color: "#190e0d" }}>›</button>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 1, marginBottom: 2 }}>
        {DOW.map(d => <div key={d} style={{ textAlign: "center", fontSize: "0.62rem", color: "#5a5352", fontWeight: 600, padding: "2px 0", textTransform: "uppercase" }}>{d}</div>)}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 1 }}>
        {getDays().map((d, i) => {
          if (!d) return <div key={"e" + i} style={{ aspectRatio: "1", minHeight: 30 }} />;
          const isPast = d < today;
          const isBlockedRaw = blockedSet.has(ymd(d));
          let usableAsCheckout = isBlockedRaw && from && !to && d > from;
          if (usableAsCheckout) {
            // Solo válido como salida si todas las noches entre la entrada y este día están libres
            for (let c = new Date(from.getTime() + 86400000); c < d; c = new Date(c.getTime() + 86400000)) {
              if (blockedSet.has(ymd(c))) { usableAsCheckout = false; break; }
            }
          }
          const isBlocked = (isBlockedRaw || isPast) && !usableAsCheckout;
          const isFrom = from && ymd(from) === ymd(d), isTo = to && ymd(to) === ymd(d);
          const inRange = from && to && d > from && d < to;
          const inHover = from && !to && hover && d > from && d <= hover;
          let bg = "transparent", color = "#190e0d", fw = 400;
          if (isBlockedRaw && !usableAsCheckout) { bg = "#f4f0ee"; color = "#b8b0ad"; }
          else if (usableAsCheckout) { bg = "rgba(137,0,0,0.04)"; color = "#190e0d"; }
          if (inRange || inHover) bg = "rgba(137,0,0,0.08)";
          if (isFrom || isTo) { bg = "#890000"; color = "#fefbf8"; fw = 600; }
          return (
            <div key={i} onClick={() => handleClick(d)} onMouseEnter={() => from && !to && setHover(d)} onMouseLeave={() => setHover(null)}
              style={{ aspectRatio: "1", minHeight: 30, display: "flex", alignItems: "center", justifyContent: "center", boxSizing: "border-box", fontSize: "0.78rem", background: bg, color, borderRadius: 4, cursor: isBlocked ? "not-allowed" : "pointer", fontWeight: fw }}>
              {d.getDate()}
            </div>
          );
        })}
      </div>
    </div>
  );
}

    return () => { cancelled = true; };
  }, [roomKey]);

  const from = value.check_in ? new Date(value.check_in + "T00:00:00") : undefined;
  const to = value.check_out ? new Date(value.check_out + "T00:00:00") : undefined;
  const nights = from && to ? Math.round((to - from) / 86400000) : 0;

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 8, width: "100%" }}>
      {loading ? <p style={{ fontSize: "0.75rem", color: "#5a5352" }}>Consultando disponibilidad…</p> : (
        <>
          <Calendar blocked={blocked} range={{ from, to }} onSelect={r => onChange({ check_in: r.from ? ymd(r.from) : "", check_out: r.to ? ymd(r.to) : "" })} />
          <p style={{ fontSize: "0.68rem", color: "#5a5352" }}>Los días en gris no están disponibles.</p>
          {from && to && nights > 0 && (
            <p style={{ fontSize: "0.78rem" }}>{nights} noche{nights > 1 ? "s" : ""} seleccionada{nights > 1 ? "s" : ""}</p>
          )}
        </>
      )}
    </div>
  );
}

  const [form, setForm] = useState(emptyForm(initialRoom));
  const [submitting, setSubmitting] = useState(false);
  const [confirmed, setConfirmed] = useState(null);

  useEffect(() => {
    if (open && initialRoom && initialRoom !== form.room_type && !confirmed && !submitting) {
      setForm(f => ({ ...f, room_type: initialRoom }));

  }, [open, initialRoom]);

  async function onSubmit(e) {
    e.preventDefault();
    if (!form.check_in || !form.check_out) { toast.err("Selecciona las fechas de tu estancia"); return; }

            <p style={{ fontSize: "0.875rem", color: "#5a5352" }}>En breve recibirás un email con el enlace de pago para confirmar la reserva. También te enviaremos las instrucciones de check-in antes de tu llegada.</p>

          </div>

// ── DatePickerCard (in-chat) — matches original exactly ──
function DatePickerCard({ roomKey, onConfirm }) {
  const [range, setRange] = useState({});
  const [blocked, setBlocked] = useState([]);
  const [loading, setLoading] = useState(true);
  const [confirmed, setConfirmed] = useState(false);

  useEffect(() => {
    let cancelled = false;
    getBlockedDates(roomKey, 365).then(list => { if (!cancelled) { setBlocked(list); setLoading(false); } });
    return () => { cancelled = true; };
  }, [roomKey]);

  if (confirmed) return <div style={{ fontSize: "0.75rem", color: "#5a5352" }}>Fechas confirmadas ✓</div>;
  const nights = range.from && range.to ? Math.round((range.to - range.from) / 86400000) : 0;

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 8, width: "100%" }}>
      {loading ? <p style={{ fontSize: "0.75rem", color: "#5a5352" }}>Consultando disponibilidad…</p> : (
        <>
          <Calendar blocked={blocked} range={range} onSelect={setRange} />
          {blocked.length > 0 && <p style={{ fontSize: "0.65rem", color: "#5a5352" }}>Los días en gris no están disponibles.</p>}
          {range.from && range.to && (
            <div style={{ fontSize: "0.78rem" }}><strong>{fmtEs(ymd(range.from))}</strong> → <strong>{fmtEs(ymd(range.to))}</strong> · {nights} noche{nights > 1 ? "s" : ""}</div>
          )}
          <button disabled={!range.from || !range.to || nights < 1}
            onClick={() => { if (!range.from || !range.to) return; setConfirmed(true); onConfirm(ymd(range.from), ymd(range.to)); }}
            style={{ width: "100%", fontSize: "0.78rem", fontWeight: 500, padding: "8px 12px", borderRadius: 6, background: "#890000", color: "#fefbf8", border: "none", cursor: "pointer", opacity: (!range.from || !range.to || nights < 1) ? .5 : 1 }}>
            Confirmar fechas
          </button>
        </>
      )}
    </div>
  );
}

let _mid = 0;
const nextId = () => `m${++_mid}`;
const RESERVE_KEYWORDS = /reserv|disponibil|habitaci|noche|alojam/i;
const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
const CHAT_ROOMS = [
  { key: "doble", label: "Habitación doble", price: 40, capacity: 2 },
  { key: "apartamento", label: "Apartamento con cocina", price: 60, capacity: 4 },
  { key: "familiar", label: "Familiar / Hidromasaje", price: 75, capacity: 5 },
];

function ReservationChatbot() {
  const [open, setOpen] = useState(false);
  const [messages, setMessages] = useState([]);
  const [quickReplies, setQuickReplies] = useState([]);
  const [input, setInput] = useState("");
  const [pending, setPending] = useState(null);
  const [draft, setDraft] = useState({});
  const scrollRef = useRef(null);
  const inputRef = useRef(null);

  useEffect(() => { scrollRef.current?.scrollTo({ top: scrollRef.current.scrollHeight, behavior: "smooth" }); }, [messages, quickReplies]);

  function pushBot(content, delay = 300) { return new Promise(res => setTimeout(() => { setMessages(m => [...m, { id: nextId(), from: "bot", content }]); res(); }, delay)); }
  function pushUser(content) { setMessages(m => [...m, { id: nextId(), from: "user", content }]); }

  async function showEnd() {
    setPending(null);
    await pushBot("¿Puedo ayudarte con algo más?");
    setQuickReplies([{ label: "Hacer otra reserva", onClick: () => startReservation(true) }, { label: "← Volver al inicio", onClick: showRoot, variant: "ghost" }]);
  }
  function showRoot() {
    setPending(null); setDraft({});
    setQuickReplies([
      { label: "📅 Consultar disponibilidad", onClick: () => startReservation(true) },
      { label: "💶 Ver precios", onClick: flowPrices },
      { label: "📍 Cómo llegar", onClick: flowDirections },
      { label: "🏰 Qué ver en Oropesa", onClick: flowSights },
    ]);
  }
  useEffect(() => {
    if (open && messages.length === 0) {
      (async () => { await pushBot("¡Hola! Soy el asistente del Hostal La Plata en Oropesa. ¿En qué puedo ayudarte?", 150); showRoot(); })();
    }
  }, [open]);

  async function startReservation(fromUser = true) {
    if (fromUser) pushUser("Consultar disponibilidad");
    setQuickReplies([]); setDraft({});
    await pushBot("Perfecto, te ayudo a reservar. ¿Qué tipo de habitación prefieres?");
    setPending("ask-room");
    setQuickReplies(CHAT_ROOMS.map(r => ({ label: `${r.label} · ${r.price}€`, onClick: () => chooseRoom(r.key, r.label, r.price) })));
  }
  async function chooseRoom(key, label, price) {
    pushUser(`${label} (${price}€)`); setQuickReplies([]);
    setDraft(d => ({ ...d, room: key }));
    await pushBot("Selecciona las fechas de tu estancia en el calendario:");
    setPending("ask-dates");
    await pushBot(<DatePickerCard roomKey={key} onConfirm={onDatesPicked} />, 100);
  }
  async function onDatesPicked(check_in, check_out) {
    const nights = Math.round((new Date(check_out) - new Date(check_in)) / 86400000);
    pushUser(`${fmtEs(check_in)} → ${fmtEs(check_out)} (${nights} noche${nights > 1 ? "s" : ""})`);
    setDraft(d => ({ ...d, check_in, check_out }));
    setQuickReplies([]);
    await pushBot("¿Cuántos huéspedes sois?");
    setPending("ask-guests");
    setDraft(curDraft => {
      const room = CHAT_ROOMS.find(r => r.key === curDraft.room);
      const max = room?.capacity ?? 5;
      setQuickReplies(Array.from({ length: max }, (_, i) => i + 1).map(n => ({ label: `${n} ${n === 1 ? "huésped" : "huéspedes"}`, onClick: () => chooseGuests(n) })));
      return curDraft;
    });
  }
  async function chooseGuests(n) {
    pushUser(`${n} ${n === 1 ? "huésped" : "huéspedes"}`); setQuickReplies([]);
    setDraft(d => ({ ...d, num_guests: n }));
    await pushBot("¿Cuál es tu nombre completo?");
    setPending("ask-name");
  }
  async function submitReservation(finalDraft) {
    await pushBot("Enviando tu solicitud…");
    try {
      const res = await createReservation({ room_type: finalDraft.room, guest_name: finalDraft.guest_name, guest_email: finalDraft.guest_email, guest_phone: "", check_in: finalDraft.check_in, check_out: finalDraft.check_out, num_guests: finalDraft.num_guests, source: "chatbot" });
      await pushBot(
        <div style={{ fontSize: "0.875rem", display: "flex", flexDirection: "column", gap: 8 }}>
          <p>✅ <strong>¡Reserva recibida!</strong></p>
          <p>{res.nights} noche{res.nights > 1 ? "s" : ""} · Total estimado: <strong>{res.total_price}€</strong></p>
          <p>Te enviaremos un email a <strong>{finalDraft.guest_email}</strong> con el enlace de pago para confirmar la reserva.</p>
        </div>
      );
    } catch (err) {
      await pushBot(
        <div style={{ fontSize: "0.875rem", display: "flex", flexDirection: "column", gap: 8 }}>
          <p>❌ {err.message || "No he podido enviar la reserva"}.</p>
          <p>Escríbenos por WhatsApp <a style={{ textDecoration: "underline" }} href={WA_LINK} target="_blank" rel="noopener">{WA_NUMBER}</a> y te ayudamos al momento.</p>
        </div>
      );
    }
    await showEnd();
  }
  async function flowPrices() {
    pushUser("Ver precios"); setQuickReplies([]);
    await pushBot(
      <div>
        <p style={{ marginBottom: 8, fontWeight: 500 }}>Nuestras tarifas (por noche):</p>
        <table style={{ width: "100%", fontSize: "0.875rem", borderCollapse: "collapse" }}>
          <tbody>{CHAT_ROOMS.map(r => (
            <tr key={r.key} style={{ borderBottom: "1px solid #e4dbda" }}>
              <td style={{ padding: "6px 8px 6px 0" }}>{r.label}</td>
              <td style={{ padding: "6px 0", textAlign: "right", fontWeight: 600, color: "#890000" }}>desde {r.price}€</td>
            </tr>
          ))}</tbody>
        </table>
        <p style={{ marginTop: 12, fontSize: "0.75rem", color: "#5a5352" }}>Reservando directamente ahorras el 10% respecto a Booking y Airbnb.</p>
      </div>
    );
    setQuickReplies([{ label: "Quiero reservar", onClick: () => startReservation(true) }, { label: "← Volver al inicio", onClick: showRoot, variant: "ghost" }]);
  }
  async function flowDirections() {
    pushUser("Cómo llegar"); setQuickReplies([]);
    await pushBot(
      <div style={{ fontSize: "0.875rem", display: "flex", flexDirection: "column", gap: 8 }}>
        <p><strong>🚗 En coche:</strong> autovía A‑5 dirección Extremadura, salida km 148. Aparcamiento gratuito en el hostal.</p>

        <p><strong>🚌 En autobús:</strong> empresa AvanzaBus con parada en Oropesa.</p>
      </div>
    );
    await showEnd();
  }
  async function flowSights() {
    pushUser("Qué ver en Oropesa"); setQuickReplies([]);
    await pushBot(
      <div style={{ fontSize: "0.875rem", display: "flex", flexDirection: "column", gap: 12 }}>
        <p>Oropesa es una villa medieval declarada <strong>Conjunto Histórico-Artístico</strong>, en plena Ruta de Carlos V. Esto es lo imprescindible:</p>
        <ul style={{ display: "flex", flexDirection: "column", gap: 6, paddingLeft: 16 }}>
          <li><strong>Castillo de Oropesa y Palacio Condal</strong> — fortaleza del s. XII y palacio renacentista, hoy Parador Nacional.</li>
          <li><strong>Plaza del Navarro y Torre del Reloj</strong> — corazón del casco histórico, con vistas a la Sierra de Gredos.</li>
          <li><strong>Iglesia de Nuestra Señora de la Asunción</strong> — templo gótico-renacentista con retablos notables.</li>
          <li><strong>El Pasadizo</strong> — paso cubierto bajo las casas, una de las estampas más fotografiadas.</li>
          <li><strong>Hospital de San Juan Bautista</strong> — antiguo hospital de peregrinos del s. XVI.</li>
          <li><strong>Colegio de los Jesuitas y Capilla de San Bernardo</strong> — joya barroca con artesonado mudéjar.</li>
          <li><strong>Casco antiguo y murallas</strong> — callejuelas empedradas, arcos y restos de la muralla medieval.</li>
        </ul>
        <p><strong>Jornadas Medievales (abril):</strong> Interés Turístico Regional, con mercado artesano, torneos y el Rescate de la Princesa.</p>
        <p><strong>Gastronomía:</strong> tostón asado, cordero, migas castellanas y mazapán artesano de los obradores de la villa.</p>
      </div>
    );
    await showEnd();
  }
  async function handleSend(text) {
    const value = text.trim(); if (!value) return;
    pushUser(value); setInput("");
    if (pending === "ask-name") {
      if (value.length < 2) { await pushBot("Indícame tu nombre completo, por favor."); return; }
      setDraft(d => ({ ...d, guest_name: value }));
      await pushBot("Por último, ¿cuál es tu email?");
      setPending("ask-email"); return;
    }
    if (pending === "ask-email") {
      if (!EMAIL_RE.test(value)) { await pushBot("Ese email no parece válido. Inténtalo de nuevo."); return; }
      setDraft(curDraft => { const finalDraft = { ...curDraft, guest_email: value }; setPending(null); submitReservation(finalDraft); return finalDraft; });
      return;

    if (RESERVE_KEYWORDS.test(value)) { await startReservation(false); return; }

            <input ref={inputRef} value={input} onChange={e => setInput(e.target.value)} disabled={!inputEnabled}
              onFocus={() => setTimeout(() => inputRef.current?.scrollIntoView({ block: "nearest" }), 100)}
              placeholder={pending === "ask-name" ? "Tu nombre completo" : pending === "ask-email" ? "tu@email.com" : pending === null ? "O escribe tu mensaje…" : "Usa los botones de arriba ↑"}
              style={{ flex: 1, background: "#f1edeb", borderRadius: 20, padding: "10px 16px", fontSize: "16px", border: "none", outline: "none", opacity: inputEnabled ? 1 : .5 }} />
            <button type="submit" aria-label="Enviar" disabled={!input.trim() || !inputEnabled}
              style={{ display: "grid", placeItems: "center", width: 40, height: 40, borderRadius: "50%", background: "#890000", color: "#fefbf8", border: "none", cursor: "pointer", opacity: (!input.trim() || !inputEnabled) ? .5 : 1, fontSize: 15 }}>➤</button>
          </form>
        </div>
      )}
    </>
  );

  return chatUI;
}

// ── Toast Context (robust, no window globals) ─────────────
const ToastContext = createContext(null);
function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const ok = (msg) => { const id = Date.now() + Math.random(); setToasts(t => [...t, { id, msg, type: "ok" }]); setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500); };
  const err = (msg) => { const id = Date.now() + Math.random(); setToasts(t => [...t, { id, msg, type: "err" }]); setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500); };
  return (
    <ToastContext.Provider value={{ ok, err }}>
      {children}
      <div style={{ position: "fixed", bottom: 16, left: "50%", transform: "translateX(-50%)", zIndex: 9999, display: "flex", flexDirection: "column", gap: 8, alignItems: "center", pointerEvents: "none" }}>
        {toasts.map(t => (
          <div key={t.id} style={{ padding: "10px 18px", borderRadius: 8, fontSize: "0.85rem", fontWeight: 500, color: "#fff", background: t.type === "ok" ? "#190e0d" : "#d30b1a", boxShadow: "0 4px 16px rgba(0,0,0,.25)", maxWidth: "90vw" }}>
            {t.msg}
          </div>
        ))}
      </div>
    </ToastContext.Provider>
  );
}
function useToast() {
  const ctx = useContext(ToastContext);
  return ctx || { ok: () => {}, err: () => {} };
}

function Header({ onReserve }) {
  const [open, setOpen] = useState(false);

  function goTo(href) {
    setOpen(false);
    let tries = 0;
    function attempt() {
      const el = document.querySelector(href);
      if (el) {
        el.scrollIntoView({ behavior: "smooth", block: "start" });

        tries++;
        setTimeout(attempt, 60);
      }
    }
    setTimeout(attempt, 120);
  }

  return (
    <header style={{ position: "sticky", top: 0, zIndex: 50, background: "#fefbf8", borderBottom: "1px solid #e4dbda" }}>

// ── App ────────────────────────────────────────────────────
function AppInner() {
  const [reserveOpen, setReserveOpen] = useState(false);
  const [reserveRoom, setReserveRoom] = useState(undefined);
  const openReserve = (type) => { setReserveRoom(type); setReserveOpen(true); };

  useEffect(() => {
    let meta = document.querySelector('meta[name="viewport"]');
    const prevContent = meta ? meta.getAttribute("content") : null;
    if (!meta) {
      meta = document.createElement("meta");
      meta.setAttribute("name", "viewport");
      document.head.appendChild(meta);
    }
    meta.setAttribute("content", "width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no");
    return () => { if (meta && prevContent !== null) meta.setAttribute("content", prevContent); };
  }, []);

  return (
    <div style={{ fontFamily: "'Inter',system-ui,sans-serif", color: "#190e0d", background: "#fefbf8", overflowX: "hidden" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&display=swap');
        *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; touch-action: manipulation; }
        body { touch-action: manipulation; }
        input, select, textarea { font-size: 16px; }
        a { color: inherit; }
        img { display: block; max-width: 100%; }
        button { font-family: inherit; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #e4dbda; border-radius: 3px; }

        /* Header: mobile menu / desktop nav toggle */
        @media (min-width: 768px) {
          .desktop-nav { display: flex !important; }
          .desktop-cta { display: inline-flex !important; }
          .mobile-toggle { display: none !important; }
        }

        /* Gallery: 4 cols desktop, 2 cols mobile */
        @media (max-width: 768px) {
          .gallery-grid { grid-template-columns: repeat(2,1fr) !important; }
        }

        /* WhatsApp FAB: mobile only */
        @media (min-width: 640px) {
          .wa-fab-mobile-only { display: none !important; }
        }

        /* Chatbot panel: fullscreen on mobile (dvh handles keyboard correctly), floating card on desktop */
        .chat-panel {
          inset: 0;
          border-radius: 0;
          width: 100%;
          height: 100dvh;
        }
        @media (min-width: 640px) {
          .chat-panel {
            inset: auto;
            top: auto;
            bottom: 96px;
            right: 20px;
            left: auto;
            width: 380px;
            height: 600px;
            max-height: calc(100dvh - 130px);
            border-radius: 16px;
          }
        }
      `}</style>
      <TopBanner onReserve={() => openReserve()} />
      <Header onReserve={() => openReserve()} />
      <Hero onReserve={() => openReserve()} />
      <Rooms onReserve={openReserve} />
      <Gallery />
      <Services />
      <Sights />
      <Reviews />
      <Contact />
      <Footer />
      <ReservationChatbot />
      <WhatsAppFAB />
      <ReservationDialog open={reserveOpen} onOpenChange={setReserveOpen} initialRoom={reserveRoom} />
    </div>
  );
}

function App() {
  return (
    <ToastProvider>
      <AppInner />
    </ToastProvider>
  );
}
